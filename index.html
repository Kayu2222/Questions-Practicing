<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Security Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232636;
    --border: #2e3248;
    --accent: #6c8ef5;
    --accent2: #a78bfa;
    --green: #34d399;
    --text: #e2e8f0;
    --text-muted: #7c8aaa;
    --flag: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    font-size: 15px;
  }
  header {
    background: linear-gradient(135deg, #1a1d27 0%, #141728 100%);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-stats { display: flex; gap: 10px; align-items: center; margin-left: auto; flex-wrap: wrap; }
  .stat-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .stat-chip span { color: var(--text); font-weight: 600; }
  .controls {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .tab {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .per-page-wrap {
    display: flex; align-items: center; gap: 8px;
    margin-left: auto; font-size: 13px; color: var(--text-muted);
  }
  .per-page-wrap select {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 5px 8px; border-radius: 8px;
    font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; outline: none;
  }
  .questions-wrap { max-width: 900px; margin: 0 auto; padding: 20px 14px; }
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 18px;
    margin-bottom: 16px;
  }
  .question-card.flagged { border-color: var(--flag); }
  .card-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
  .q-meta { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; margin-top: 2px; }
  .q-number {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; font-size: 11px; font-weight: 700;
    padding: 3px 9px; border-radius: 20px; white-space: nowrap; letter-spacing: 0.04em;
  }
  .week-chip {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-muted); font-size: 10px; font-weight: 600;
    padding: 2px 7px; border-radius: 20px; white-space: nowrap; text-align: center;
  }
  .q-text { font-size: 14px; line-height: 1.65; color: var(--text); font-weight: 500; flex: 1; }
  .flag-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 18px; padding: 2px 4px;
    flex-shrink: 0; -webkit-tap-highlight-color: transparent;
  }
  .flag-btn.flagged { color: var(--flag); }
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  @media (max-width: 560px) { .options { grid-template-columns: 1fr; } }
  .option {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 9px; padding: 9px 12px;
    font-size: 13px; color: var(--text); line-height: 1.5;
  }
  .opt-label {
    display: inline-block; background: var(--border);
    color: var(--text-muted); border-radius: 4px;
    padding: 1px 6px; font-size: 11px; font-weight: 700;
    margin-right: 6px; letter-spacing: 0.05em;
  }
  .answer-row { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
  .answer-label { font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
  .answer-box {
    background: var(--surface2); border: 1px dashed var(--border);
    border-radius: 8px; padding: 10px 14px;
    font-size: 13px; flex: 1; cursor: pointer;
    line-height: 1.5; text-align: center;
    color: var(--text-muted);
    -webkit-tap-highlight-color: transparent;
    min-height: 44px;
    display: flex; align-items: center; justify-content: center;
  }
  .answer-box.revealed {
    background: #1e2f2a; border-color: var(--green);
    border-style: solid; text-align: left;
    flex-direction: column; align-items: flex-start;
    color: var(--text);
  }
  .correct-tag {
    display: inline-block; background: var(--green);
    color: #0f2a20; border-radius: 5px;
    padding: 2px 9px; font-size: 11px; font-weight: 700;
    margin-right: 8px; letter-spacing: 0.04em;
  }
  .exp-text {
    margin-top: 8px; color: #94a3b8; font-size: 13px; line-height: 1.65;
    border-top: 1px solid var(--border); padding-top: 8px; width: 100%;
  }
  .hint-text { font-size: 13px; pointer-events: none; }
  .pagination {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; padding: 24px 16px 44px; flex-wrap: wrap;
  }
  .page-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 10px 20px; border-radius: 9px;
    cursor: pointer; font-size: 14px; font-family: 'DM Sans', sans-serif;
    font-weight: 500; -webkit-tap-highlight-color: transparent;
    min-height: 44px;
  }
  .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .page-info { font-size: 13px; color: var(--text-muted); text-align: center; }
  .page-info strong { color: var(--text); }
  .reshuffle-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; color: #fff; padding: 10px 20px; border-radius: 9px;
    cursor: pointer; font-size: 14px; font-family: 'DM Sans', sans-serif;
    font-weight: 600; min-height: 44px; -webkit-tap-highlight-color: transparent;
  }
  .progress-bar-wrap { height: 3px; background: var(--border); position: fixed; top: 0; left: 0; right: 0; z-index: 200; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.4s ease; }
</style>
</head>
<body>

<div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>

<header>
  <div class="logo">🔐 Cloud Security Quiz</div>
  <div class="header-stats">
    <div class="stat-chip">共 <span id="totalCount">192</span> 題</div>
    <div class="stat-chip">標記 <span id="flagCount">0</span></div>
  </div>
</header>

<div class="controls">
  <div class="filter-tabs">
    <button class="tab active" onclick="setFilter('all',this)">全部</button>
    <button class="tab" onclick="setFilter('flagged',this)">⚑ 標記</button>
    <button class="tab" onclick="setFilter(1,this)">W1</button>
    <button class="tab" onclick="setFilter(2,this)">W2</button>
    <button class="tab" onclick="setFilter(3,this)">W3</button>
    <button class="tab" onclick="setFilter(4,this)">W4</button>
    <button class="tab" onclick="setFilter(5,this)">W5</button>
    <button class="tab" onclick="setFilter(6,this)">W6</button>
    <button class="tab" onclick="setFilter(7,this)">W7</button>
  </div>
  <div class="per-page-wrap">
    每批
    <select id="perPageSel" onchange="setPerPage(this.value)">
      <option value="5">5 題</option>
      <option value="10" selected>10 題</option>
      <option value="20">20 題</option>
      <option value="30">30 題</option>
    </select>
  </div>
</div>

<div class="questions-wrap" id="questionsWrap"></div>

<div class="pagination">
  <button class="page-btn" id="prevBtn" onclick="goPage(-1)">← 上一批</button>
  <div class="page-info" id="pageInfo"></div>
  <button class="page-btn" id="nextBtn" onclick="goPage(1)">下一批 →</button>
  <button class="reshuffle-btn" onclick="reshuffleAll()">🔀 洗牌</button>
</div>

<script>
var ALL_QUESTIONS = [{"id": 1, "week": 1, "q": "Which of the following involves prevention of unauthorized withholding of information?", "opts": ["A. Confidentiality ", "B. Integrity", "C. Availability", "D. Accountability"], "ans": "A", "exp": ""}, {"id": 2, "week": 1, "q": "Which of the following is an active attack? (week1 p.43)", "opts": ["A. Eavesdropping", "B. Modification", "C. Masquerade", "D. Both B and C "], "ans": "D", "exp": "Active attack 主動改變資料或偽裝身份；Eavesdropping 是 passive attack。"}, {"id": 3, "week": 1, "q": "Authentication is needed to prevent: (week1 p.45)", "opts": ["A. Eavesdropping", "B. Impersonation ", "C. Brute force", "D. Cryptanalysis"], "ans": "B", "exp": ""}, {"id": 4, "week": 1, "q": "In conventional encryption, the encryption key is known to: (week1 p.58)", "opts": ["A. Sender", "B. Receiver", "C. Eavesdropper", "D. Both A and B "], "ans": "D", "exp": "對稱式加密 sender 和 receiver 共用同一把 secret key。"}, {"id": 5, "week": 1, "q": "Which of the following is a passive attack?", "opts": ["A. Masquerade", "B. Replay", "C. Eavesdropping ", "D. Modification"], "ans": "C", "exp": ""}, {"id": 6, "week": 1, "q": "Data integrity ensures that:", "opts": ["A. Only authorized users can read data", "B. Unauthorized parties cannot modify data ", "C. Data is always available", "D. Users are authenticated"], "ans": "B", "exp": ""}, {"id": 7, "week": 1, "q": "Which security goal is violated when an attacker replays an old authentication message?", "opts": ["A. Confidentiality", "B. Integrity", "C. Authentication ", "D. Availability"], "ans": "C", "exp": ""}, {"id": 8, "week": 1, "q": "In public key cryptography, how many keys are needed for N users to communicate securely with each other?", "opts": ["A. N", "B. 2N ", "C. N(N-1)/2", "D. N²"], "ans": "B", "exp": "每個 user 各有一對公/私鑰，N 個 user 共需 2N 把 key。"}, {"id": 9, "week": 1, "q": "Which of the following is NOT a goal of cryptography?", "opts": ["A. Confidentiality", "B. Authentication", "C. Compression ", "D. Integrity"], "ans": "C", "exp": ""}, {"id": 10, "week": 1, "q": "A cryptographic hash function must be:", "opts": ["A. Reversible", "B. Fast to invert", "C. Pre-image resistant ", "D. Key-dependent"], "ans": "C", "exp": ""}, {"id": 11, "week": 1, "q": "Which type of attack tries all possible keys?", "opts": ["A. Brute force attack ", "B. Man-in-the-middle attack", "C. Replay attack", "D. Birthday attack"], "ans": "A", "exp": ""}, {"id": 12, "week": 1, "q": "In a symmetric encryption system with n users, the number of keys required for all pairs to communicate is:", "opts": ["A. n", "B. 2n", "C. n(n-1)/2 ", "D. n²"], "ans": "C", "exp": "每對 user 需要 1 把 secret key，共 C(n,2)=n(n-1)/2 把。"}, {"id": 13, "week": 2, "q": "In classical ciphers, the order of the letters in a message is rearranged by: (week2 p.19)", "opts": ["A. Transposition ciphers ", "B. Substitution ciphers", "C. Hill cipher", "D. Vigenere cipher"], "ans": "A", "exp": ""}, {"id": 14, "week": 2, "q": "The Caesar cipher is a ______ cipher. (week2 p.3)", "opts": ["A. Transposition", "B. Substitution ", "C. Product", "D. Keyword-based"], "ans": "B", "exp": ""}, {"id": 15, "week": 2, "q": "The key size of the Shift cipher (=Caesar cipher) is: (week2 p.7)", "opts": ["A. 3", "B. 13", "C. 25 ", "D. 26!"], "ans": "C", "exp": ""}, {"id": 16, "week": 2, "q": "The permutation determined by keyword \"model\" is: (week2 p.20)", "opts": ["A. 45123 ", "B. 13254", "C. 54321", "D. 32154"], "ans": "A", "exp": "d=1,e=2,l=3,m=4,o=5 → m(pos1)=4, o(pos2)=5, d(pos3)=1, e(pos4)=2, l(pos5)=3 → 45123"}, {"id": 17, "week": 2, "q": "If C=5P+6, the decryption algorithm is: (week2 p.13)", "opts": ["A. P=3C+10", "B. P=9C+10", "C. P=21C+4 ", "D. P=25C+20"], "ans": "C", "exp": "k1=5, k1⁻¹=21 (5×21=105≡1 mod 26); p=21(c-6)=21c-126≡21c+4 (mod 26)"}, {"id": 18, "week": 2, "q": "The key size of the affine cipher is: (week2 p.13)", "opts": ["A. 25", "B. 12×26 ", "C. 13×25", "D. 25×26"], "ans": "B", "exp": ""}, {"id": 19, "week": 2, "q": "The simplified AES uses a ______ bit block size and key size of ______ bits. (week2 p.28)", "opts": ["A. 16; 16 ", "B. 32; 32", "C. 64; 56", "D. 128; 128"], "ans": "A", "exp": ""}, {"id": 20, "week": 2, "q": "In simplified AES substitution, ______ bits are substituted by ______ bits. (week2 p.32)", "opts": ["A. 4; 4 ", "B. 6; 4", "C. 8; 8", "D. 16; 16"], "ans": "A", "exp": ""}, {"id": 21, "week": 2, "q": "In simplified AES, columns are mixed over the Galois Field: (week2 p.36)", "opts": ["A. GF(2)", "B. GF(2²)", "C. GF(2⁴) ", "D. GF(2⁸)"], "ans": "C", "exp": ""}, {"id": 22, "week": 2, "q": "In simplified AES, ______ round keys are needed. (week2 p.28)", "opts": ["A. 2", "B. 3 ", "C. 4", "D. 5"], "ans": "B", "exp": ""}, {"id": 23, "week": 2, "q": "In the Caesar cipher with key k=3, what is the ciphertext of plaintext letter \"y\"?", "opts": ["A. \"a\"", "B. \"b\" ", "C. \"c\"", "D. \"z\""], "ans": "B", "exp": "p=\"y\"=24; c=24+3=27≡1 (mod 26)=\"b\""}, {"id": 24, "week": 2, "q": "In the shift cipher with k=5, what is the encryption of plaintext \"s\" (=18)?", "opts": ["A. \"m\"", "B. \"n\"", "C. \"x\" ", "D. \"y\""], "ans": "C", "exp": "c=18+5=23=\"x\""}, {"id": 25, "week": 2, "q": "In the affine cipher with k1=5, k2=3, the ciphertext of \"y\" (=24) is:", "opts": ["A. \"r\"", "B. \"s\"", "C. \"t\" ", "D. \"u\""], "ans": "C", "exp": "c=5×24+3=123≡19 (mod 26)=\"t\""}, {"id": 26, "week": 2, "q": "A cryptosystem is a five-tuple (P, C, K, E, D). What does K represent? (week2 p.6)", "opts": ["A. A finite set of plaintexts", "B. A finite set of ciphertexts", "C. A finite set of possible keys (keyspace) ", "D. A finite set of decryption rules"], "ans": "C", "exp": ""}, {"id": 27, "week": 2, "q": "In a transposition cipher with keyword of m distinct letters, the total number of possible permutations is: (week2 p.24)", "opts": ["A. m", "B. 2m", "C. 26m", "D. m! "], "ans": "D", "exp": ""}, {"id": 28, "week": 2, "q": "What is 34 mod 26?", "opts": ["A. 6", "B. 7", "C. 8 ", "D. 9"], "ans": "C", "exp": ""}, {"id": 29, "week": 2, "q": "In GF(16), what is 1+3?", "opts": ["A. 4", "B. 2 ", "C. 0", "D. 3"], "ans": "B", "exp": "1 XOR 3 = 01 XOR 11 = 10 = 2"}, {"id": 30, "week": 2, "q": "Which condition must hold for k1 in an affine cipher over Z26? (week2 p.13)", "opts": ["A. k1 must be even", "B. gcd(k1, 26) = 1 ", "C. k1 must be prime", "D. k1 > 13"], "ans": "B", "exp": ""}, {"id": 31, "week": 2, "q": "In simplified AES, what operation is performed in AddRoundKey? (week2 p.30)", "opts": ["A. Byte substitution using S-Box", "B. Row shifting", "C. XOR with the round key ", "D. Column mixing"], "ans": "C", "exp": ""}, {"id": 32, "week": 2, "q": "Which step of simplified AES provides diffusion by moving bytes between columns? (week2 p.33)", "opts": ["A. AddRoundKey", "B. SubNibbles", "C. ShiftRows ", "D. MixColumns"], "ans": "C", "exp": ""}, {"id": 33, "week": 2, "q": "The Caesar cipher is insecure because:", "opts": ["A. The key space is too large", "B. The key space is too small (only 25 keys) ", "C. It uses complex mathematics", "D. It cannot encrypt numbers"], "ans": "B", "exp": ""}, {"id": 34, "week": 2, "q": "In GF(16) arithmetic, what is a + a for any element a?", "opts": ["A. 0 ", "B. 2a", "C. a", "D. 1"], "ans": "A", "exp": "a XOR a = 0 for all a"}, {"id": 35, "week": 2, "q": "In breaking an affine cipher, given (P,C) pairs (A,F) and (G,Y), how many equations are needed to find k1 and k2?", "opts": ["A. 1", "B. 2 ", "C. 3", "D. 4"], "ans": "B", "exp": ""}, {"id": 36, "week": 2, "q": "How many possible affine ciphers are there over Z26? (week2 p.16)", "opts": ["A. 25", "B. 26", "C. 286", "D. 312 "], "ans": "D", "exp": "k1 有 12 個合法值，k2 有 26 個 → 12×26=312"}, {"id": 37, "week": 2, "q": "In simplified AES, the MixColumns step operates on:", "opts": ["A. Individual bits", "B. Individual bytes", "C. Columns of the state matrix ", "D. Rows of the state matrix"], "ans": "C", "exp": ""}, {"id": 38, "week": 2, "q": "The Scytale is the prototype of which type of cipher? (week2 p.19)", "opts": ["A. Substitution cipher", "B. Transposition cipher ", "C. Product cipher", "D. Stream cipher"], "ans": "B", "exp": ""}, {"id": 39, "week": 2, "q": "In the affine cipher, what happens when k1=1 and k2=0?", "opts": ["A. Encryption is impossible", "B. Maximum security is achieved", "C. Plaintext equals ciphertext (no encryption) ", "D. The cipher becomes a Caesar cipher"], "ans": "C", "exp": ""}, {"id": 40, "week": 2, "q": "In GF(16), multiplication uses which irreducible polynomial? (week2 p.36)", "opts": ["A. x³+x+1", "B. x⁴+x+1 ", "C. x⁴+x²+1", "D. x⁸+x⁴+x³+x+1"], "ans": "B", "exp": ""}, {"id": 41, "week": 2, "q": "In simplified AES, which step provides confusion (non-linearity)?", "opts": ["A. SubNibbles ", "B. ShiftRows", "C. MixColumns", "D. AddRoundKey"], "ans": "A", "exp": ""}, {"id": 42, "week": 2, "q": "The number of rounds in simplified AES is: (week2 p.28)", "opts": ["A. 1", "B. 2 ", "C. 3", "D. 4"], "ans": "B", "exp": ""}, {"id": 43, "week": 3, "q": "AES uses a ______ bit block size and key size of ______ bits. (week3 p.4)", "opts": ["A. 128; 128 or 256", "B. 64; 128 or 192", "C. 256; 128, 192, or 256", "D. 128; 128, 192, or 256 "], "ans": "D", "exp": ""}, {"id": 44, "week": 3, "q": "The 4×4 byte matrices in AES are called: (week3 p.7)", "opts": ["A. States ", "B. Words", "C. Transitions", "D. Permutations"], "ans": "A", "exp": ""}, {"id": 45, "week": 3, "q": "For AES-128, ______ similar rounds and ______ round is different. (week3 p.27)", "opts": ["A. 8; the first", "B. 9; the last ", "C. 10; the first", "D. 11; the last"], "ans": "B", "exp": ""}, {"id": 46, "week": 3, "q": "In AES, columns are mixed over the Galois Field: (week3 p.15)", "opts": ["A. GF(2)", "B. GF(2²)", "C. GF(2⁴)", "D. GF(2⁸) "], "ans": "D", "exp": ""}, {"id": 47, "week": 3, "q": "In AES-128, ______ round keys are needed. (week3 p.4)", "opts": ["A. 10", "B. 11 ", "C. 12", "D. 13"], "ans": "B", "exp": ""}, {"id": 48, "week": 3, "q": "Order of 4 transformations in one AES-128 round: (week3 p.27)", "opts": ["A. SubBytes, ShiftRows, MixColumns, AddRoundKeys ", "B. AddRoundKeys, SubBytes, ShiftRows, MixColumns", "C. MixColumns, AddRoundKeys, SubBytes, ShiftRows", "D. ShiftRows, MixColumns, AddRoundKeys, SubBytes"], "ans": "A", "exp": ""}, {"id": 49, "week": 3, "q": "Last round of AES-128 has 3 transformations: (week3 p.27)", "opts": ["A. ShiftRows, MixColumns, AddRoundKeys", "B. SubBytes, MixColumns, AddRoundKeys", "C. SubBytes, ShiftRows, AddRoundKeys ", "D. SubBytes, ShiftRows, MixColumns"], "ans": "C", "exp": ""}, {"id": 50, "week": 3, "q": "Alice encrypts message to Bob using _____.", "opts": ["A. Alice's public key", "B. Bob's public key ", "C. Alice's private key", "D. Bob's private key"], "ans": "B", "exp": ""}, {"id": 51, "week": 3, "q": "Bob decrypts message from Alice using _____.", "opts": ["A. Alice's public key", "B. Bob's public key", "C. Alice's private key", "D. Bob's private key "], "ans": "D", "exp": ""}, {"id": 52, "week": 3, "q": "In RSA key generation, required condition: (week3 p.40)", "opts": ["A. ed=1 (mod pq)", "B. ed=1 (mod (p-1)(q-1)) ", "C. ed=1 (mod p(q-1))", "D. ed=1 (mod (p-1)q)"], "ans": "B", "exp": ""}, {"id": 53, "week": 3, "q": "In AES AddRoundKey, the state is XORed with: (week3 p.8)", "opts": ["A. The S-Box output", "B. The round key ", "C. The previous state", "D. A fixed constant"], "ans": "B", "exp": ""}, {"id": 54, "week": 3, "q": "In AES SubBytes, each byte is replaced using: (week3 p.9-10)", "opts": ["A. A linear function", "B. A 16×16 S-Box lookup table ", "C. XOR with the key", "D. A permutation table"], "ans": "B", "exp": ""}, {"id": 55, "week": 3, "q": "In AES ShiftRows, the 2nd row is shifted by:", "opts": ["A. 0 bytes", "B. 1 byte to the left ", "C. 2 bytes to the left", "D. 3 bytes to the left"], "ans": "B", "exp": ""}, {"id": 56, "week": 3, "q": "In AES ShiftRows, the 4th row is shifted by:", "opts": ["A. 0 bytes", "B. 1 byte to the left", "C. 2 bytes to the left", "D. 3 byt : "B", "exp": ""}, {"id": 183, "week": 7, "q": "In the SSL handshake, the ClientHello message contains:", "opts": ["A. The server's certificate", "B. Possible cipher-suites and Client_random ", "C. The encrypted pre-master secret", "D. The master secret"], "ans": "B", "exp": ""}, {"id": 184, "week": 7, "q": "In the SSL handshake, ClientKeyExchange contains:", "opts": ["A. The client's certificate", "B. The Pre_Master_Secret encrypted with server's public key ", "C. The session ID", "D. The MAC key"], "ans": "B", "exp": ""}, {"id": 185, "week": 7, "q": "ChangeCipherSpec (CCS) in SSL signals:", "opts": ["A. The start of a new session", "B. Switching to the newly negotiated cipher and keys ", "C. The end of the connection", "D. A certificate error"], "ans": "B", "exp": ""}, {"id": 186, "week": 7, "q": "X.509 certificate format version 3 added:", "opts": ["A. The serial number field", "B. Subject unique identifier", "C. Extensions ", "D. The signature algorithm field"], "ans": "C", "exp": ""}, {"id": 187, "week": 7, "q": "In the Man-in-the-Middle attack on public key distribution, the attacker:", "opts": ["A. Decrypts all messages permanently", "B. Intercepts public keys and substitutes his own, learning the session key ", "C. Breaks the encryption algorithm", "D. Forges a certificate"], "ans": "B", "exp": ""}, {"id": 188, "week": 7, "q": "SSL connection state variables include:", "opts": ["A. Only the session ID", "B. Server_random, client_random, sequence numbers, and cryptographic keys/IVs ", "C. Only the master_secret", "D. Only the cipher spec"], "ans": "B", "exp": ""}, {"id": 189, "week": 7, "q": "An SSL session may span:", "opts": ["A. Only one connection", "B. Multiple connections for efficiency ", "C. Only encrypted connections", "D. At most 8 connections"], "ans": "B", "exp": ""}, {"id": 190, "week": 7, "q": "Ephemeral public keys in SSL provide:", "opts": ["A. Faster encryption", "B. Forward secrecy ", "C. Stronger authentication", "D. Larger key sizes"], "ans": "B", "exp": ""}, {"id": 191, "week": 7, "q": "In Diffie-Hellman key exchange, the shared key K is:", "opts": ["A. g^A mod p", "B. g^B mod p", "C. g^AB mod p ", "D. A × B mod p"], "ans": "C", "exp": ""}, {"id": 192, "week": 7, "q": "At the top of the Global X.509 CA Hierarchy is:", "opts": ["A. A government CA", "B. A commercial CA", "C. A Root CA ", "D. The user's local CA"], "ans": "C", "exp": ""}];

var shuffled = [];
var flagged = {};
var currentPage = 0;
var perPage = 10;
var filter = 'all';

function seededRand(seed) {
  var s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

function shuffle(arr, seed) {
  var rand = seededRand(seed);
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(rand() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function init() {
  shuffled = shuffle(ALL_QUESTIONS, Math.floor(Math.random() * 999999));
  render();
}

function getVisible() {
  if (filter === 'flagged') {
    return shuffled.filter(function(q){ return flagged[q.id]; });
  }
  if (typeof filter === 'number') {
    return shuffled.filter(function(q){ return q.week === filter; });
  }
  return shuffled;
}

function render() {
  var visible = getVisible();
  var totalPages = Math.max(1, Math.ceil(visible.length / perPage));
  if (currentPage >= totalPages) currentPage = totalPages - 1;
  if (currentPage < 0) currentPage = 0;

  var start = currentPage * perPage;
  var batch = visible.slice(start, start + perPage);

  var fc = Object.keys(flagged).filter(function(k){ return flagged[k]; }).length;
  document.getElementById('flagCount').textContent = fc;
  document.getElementById('totalCount').textContent = visible.length;
  document.getElementById('progressBar').style.width = ((currentPage + 1) / totalPages * 100) + '%';
  document.getElementById('pageInfo').innerHTML =
    '<strong>' + (currentPage+1) + ' / ' + totalPages + '</strong>&nbsp;&nbsp;' + visible.length + ' 題';
  document.getElementById('prevBtn').disabled = currentPage === 0;
  document.getElementById('nextBtn').disabled = currentPage >= totalPages - 1;

  var wrap = document.getElementById('questionsWrap');
  if (batch.length === 0) {
    wrap.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-muted)"><div style="font-size:48px;margin-bottom:14px">⚑</div><p>尚未標記任何題目</p></div>';
    return;
  }

  var html = '';
  for (var i = 0; i < batch.length; i++) {
    var q = batch[i];
    var isFlagged = !!flagged[q.id];
    var opts = '';
    for (var j = 0; j < q.opts.length; j++) {
      var letter = q.opts[j].charAt(0);
      var txt = q.opts[j].slice(3);
      opts += '<div class="option"><span class="opt-label">' + letter + '</span>' + escHtml(txt) + '</div>';
    }
    var ansOpt = '';
    for (var k = 0; k < q.opts.length; k++) {
      if (q.opts[k].charAt(0) === q.ans) { ansOpt = q.opts[k].slice(3); break; }
    }
    var expHtml = q.exp ? '<div class="exp-text">' + escHtml(q.exp) + '</div>' : '';
    html += '<div class="question-card' + (isFlagged ? ' flagged' : '') + '" id="card-' + q.id + '">'
      + '<div class="card-header">'
      + '<div class="q-meta"><span class="q-number">Q' + q.id + '</span><span class="week-chip">W' + q.week + '</span></div>'
      + '<div class="q-text">' + escHtml(q.q) + '</div>'
      + '<button class="flag-btn' + (isFlagged ? ' flagged' : '') + '" onclick="toggleFlag(' + q.id + ')">⚑</button>'
      + '</div>'
      + '<div class="options">' + opts + '</div>'
      + '<div class="answer-row"><span class="answer-label">答案：</span>'
      + '<div class="answer-box" onclick="revealAns(this,' + q.id + ')">'
      + '<span class="hint-text">👆 點擊顯示答案</span>'
      + '<div class="answer-inner" style="display:none">'
      + '<span class="correct-tag">✓ ' + q.ans + '</span>'
      + escHtml(ansOpt) + expHtml
      + '</div>'
      + '</div></div>'
      + '</div>';
  }
  wrap.innerHTML = html;
  window.scrollTo(0, 0);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function revealAns(el, id) {
  el.classList.toggle('revealed');
  var inner = el.querySelector('.answer-inner');
  var hint = el.querySelector('.hint-text');
  if (el.classList.contains('revealed')) {
    inner.style.display = 'block';
    hint.style.display = 'none';
  } else {
    inner.style.display = 'none';
    hint.style.display = 'block';
  }
}

function toggleFlag(id) {
  flagged[id] = !flagged[id];
  render();
}

function goPage(dir) { currentPage += dir; render(); }

function setFilter(f, btn) {
  filter = f;
  currentPage = 0;
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  btn.classList.add('active');
  render();
}

function setPerPage(v) { perPage = parseInt(v); currentPage = 0; render(); }

function reshuffleAll() {
  shuffled = shuffle(ALL_QUESTIONS, Math.floor(Math.random() * 999999));
  currentPage = 0;
  render();
}

init();
</script>
